name: Світлобот Дударків

on:
  schedule:
    # 1️⃣ Надсилання графіку щодня о 7:00 Київського часу
    - cron: "0 4 * * *"  # UTC (Київ +3 години зимою)
    # 2️⃣ Перевірка каналу кожні 5 хв
    - cron: "*/5 * * * *"
  workflow_dispatch:  # ручний запуск

jobs:
  send-schedule:
    if: github.event.schedule == '0 4 * * *'  # графік
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Встановити Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Встановити залежності
        run: pip install requests python-telegram-bot beautifulsoup4 --upgrade
      - name: Надіслати графік
        run: python parser.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: schedule

  check-channel:
    if: github.event.schedule != '0 4 * * *'  # канал
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Встановити Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Встановити залежності
        run: pip install requests python-telegram-bot beautifulsoup4 --upgrade
      - name: Перевірка каналу
        run: python parser.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: channel
