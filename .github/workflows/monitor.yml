name: Світлобот Дударків

on:
  schedule:
    - cron: "*/5 * * * *"  # перевірка кожні 5 хв
  workflow_dispatch:  # дозволяє запускати вручну

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Встановити Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Встановити залежності
        run: pip install requests python-telegram-bot --upgrade
      - name: Запустити парсер
        run: python parser.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
